name: Check p-johojima close updates

on:
  schedule:
    # 毎日 23:00 UTC = 翌08:00 JST に実行（GitHubの混雑で数分〜十数分遅れる場合あり）
    - cron: "0 23 * * *"
  workflow_dispatch: {} # 手動実行も可能

# state.json をコミットするために書き込み権限が必要
permissions:
  contents: write

# 同時実行を防ぐ
concurrency:
  group: check-updates
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run checker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python check_updates.py

      - name: Commit updated state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update state.json [skip ci]"
            git push
          else
            echo "state.json に変更なし"
          fi
